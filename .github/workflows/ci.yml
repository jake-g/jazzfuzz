name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check python style formatting
      run: |
        black --check maintenance.py maintenance_test.py

    - name: Validate scripts compile
      run: |
        python -m py_compile maintenance.py maintenance_test.py

    - name: Run unit tests
      run: |
        python -m unittest discover -p "*_test.py"

    - name: Verify YouTube links are active
      run: |
        python maintenance.py test-links

    - name: Validate release years
      run: |
        python maintenance.py validate-years

    - name: Validate playlist formats
      run: |
        python maintenance.py validate-playlists
