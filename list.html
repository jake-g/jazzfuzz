<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazz Fuzz</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: monospace;
      padding: 0 10% 5% 10%;
      margin: 0;
    }
    .sticky-header {
      position: sticky;
      top: 0;
      background-color: #000;
      z-index: 100;
      padding-top: 15px;
      padding-bottom: 5px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 24px;
      margin: 0;
      letter-spacing: -0.5px;
    }
    p {
      color: #888;
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .nav-links {
      font-size: 13px;
    }
    .nav-links a {
      color: #fff;
      text-decoration: underline;
      margin-left: 15px;
    }
    .nav-links a:hover {
      color: #ccc;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 13px;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #222;
    }
    th {
      color: #888;
      cursor: pointer;
      user-select: none;
      text-transform: uppercase;
      font-size: 11px;
      position: sticky;
      top: 85px;
      background-color: #000;
      z-index: 90;
    }
    th:hover {
      color: #fff;
    }
    tr:hover td {
      background-color: #111;
    }
    a {
      color: #ccc;
      text-decoration: underline;
    }
    a:hover {
      color: #fff;
    }
    .sort-icon {
      margin-left: 5px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <header class="sticky-header">
    <div class="header-top">
      <h1 id="page-heading">Loading...</h1>
      <div class="nav-links" id="nav-links-container"></div>
    </div>
    <p id="page-description"></p>
  </header>

  <table id="data-table">
    <thead>
      <tr id="table-headers"></tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="100%">Loading data...</td></tr>
    </tbody>
  </table>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const view = urlParams.get('view') || 'queue';

    const config = {
      queue: {
        title: "Jazz Fuzz - Queue",
        heading: "Queue",
        description: "A list of albums queued for evaluation, researched with library ratings and popularity scores. Click headers to sort.",
        tsvFile: "albums_queue.tsv",
        navLinks: `
          <a href="index.html">← Back to Catalog</a>
          <a href="list.html?view=glossary">Albums</a>
          <a href="https://github.com/jake-g/jazzfuzz/edit/main/albums_queue.tsv" target="_blank">Suggest Additions ↗</a>
        `
      },
      glossary: {
        title: "Jazz Fuzz - Albums Index",
        heading: "Albums Index",
        description: "A structured index of all albums currently reviewed on the site. Click headers to sort.",
        tsvFile: "albums_glossary.tsv",
        navLinks: `
          <a href="index.html">← Back to Catalog</a>
          <a href="list.html?view=queue">Queue</a>
        `
      }
    };

    const currentConfig = config[view] || config.queue;

    // Apply configuration dynamically
    document.title = currentConfig.title;
    document.getElementById('page-heading').textContent = currentConfig.heading;
    document.getElementById('page-description').textContent = currentConfig.description;
    document.getElementById('nav-links-container').innerHTML = currentConfig.navLinks;

    let currentData = [];
    let headers = [];
    let sortDirection = {};

    async function loadTable() {
      try {
        const response = await fetch(currentConfig.tsvFile);
        const tsvText = await response.text();
        parseAndRender(tsvText);
      } catch (error) {
        document.getElementById('table-body').innerHTML = `<tr><td colspan="100%" style="color:red;">Error loading TSV: ${error.message}</td></tr>`;
      }
    }

    function parseAndRender(tsvText) {
      const lines = tsvText.split(/\r?\n/).filter(line => line.trim() !== '');
      if (lines.length === 0) return;

      headers = lines[0].split('\t').map(h => h.trim());
      currentData = lines.slice(1).map(line => {
        const cols = line.split('\t');
        let rowObj = {};
        headers.forEach((header, idx) => {
          rowObj[header] = cols[idx] !== undefined ? cols[idx].trim() : '';
        });
        return rowObj;
      });

      renderHeaders();
      renderBody(currentData);
    }

    function renderHeaders() {
      const headerRow = document.getElementById('table-headers');
      headerRow.innerHTML = '';
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        th.addEventListener('click', () => sortTable(h));
        const icon = document.createElement('span');
        icon.className = 'sort-icon';
        icon.id = `sort-icon-${h}`;
        th.appendChild(icon);
        headerRow.appendChild(th);
      });
    }

    function renderBody(data) {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="100%">No records found.</td></tr>';
        return;
      }

      data.forEach(row => {
        const tr = document.createElement('tr');
        headers.forEach(header => {
          const td = document.createElement('td');
          const val = row[header];

          if (val.startsWith('http://') || val.startsWith('https://')) {
            const link = document.createElement('a');
            link.href = val;
            link.target = '_blank';
            link.textContent = 'Link';
            td.appendChild(link);
          } else {
            td.textContent = val;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function sortTable(column) {
      const currentDir = sortDirection[column] || 'desc';
      const newDir = currentDir === 'asc' ? 'desc' : 'asc';
      sortDirection = { [column]: newDir };

      headers.forEach(h => {
        const icon = document.getElementById(`sort-icon-${h}`);
        if (h === column) {
          icon.textContent = newDir === 'asc' ? ' ▲' : ' ▼';
        } else {
          icon.textContent = '';
        }
      });

      currentData.sort((a, b) => {
        let valA = a[column];
        let valB = b[column];

        const numA = parseFloat(valA);
        const numB = parseFloat(valB);
        if (!isNaN(numA) && !isNaN(numB)) {
          return newDir === 'asc' ? numA - numB : numB - numA;
        }

        valA = valA.toLowerCase();
        valB = valB.toLowerCase();
        if (valA < valB) return newDir === 'asc' ? -1 : 1;
        if (valA > valB) return newDir === 'asc' ? 1 : -1;
        return 0;
      });

      renderBody(currentData);
    }

    window.onload = loadTable;
  </script>
</body>
</html>
