<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Turbulence displacement to create organic analog/fuzz texture -->
    <filter id="analog-fuzz" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Black circular canvas representing the portal -->
  <circle cx="256" cy="256" r="240" fill="#000000" />

  <g filter="url(#analog-fuzz)">
    <!-- Minimalist white silhouette/lines of a saxophone -->
    <path d="M 160 120
             L 160 300
             C 160 380, 220 400, 270 400
             C 320 400, 360 350, 360 280
             C 360 240, 330 220, 300 220
             C 270 220, 250 245, 255 275
             C 260 295, 280 310, 300 310"
          fill="none"
          stroke="#ffffff"
          stroke-width="26"
          stroke-linecap="round"
          stroke-linejoin="round" />

    <!-- Cosmic waves / sound waves coming out of the bell -->
    <path d="M 330 250
             C 370 210, 420 220, 450 180"
          fill="none"
          stroke="#ffffff"
          stroke-width="12"
          stroke-linecap="round" />

    <path d="M 310 200
             C 350 150, 400 170, 430 110"
          fill="none"
          stroke="#ffffff"
          stroke-width="8"
          stroke-linecap="round" />

    <path d="M 280 180
             C 310 110, 360 120, 380 60"
          fill="none"
          stroke="#ffffff"
          stroke-width="6"
          stroke-linecap="round" />

    <!-- Concentric orbital stars/dust -->
    <circle cx="256" cy="256" r="205" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="15 35 60 40" opacity="0.8" />
    <circle cx="256" cy="256" r="170" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.6" />
  </g>
</svg>
